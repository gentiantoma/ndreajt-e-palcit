<div class="favorites-page">
  <div class="container favorites-container">

    <div class="page-header">
      <h1 class="page-title">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1" style="color:var(--color-accent)">
          <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/>
        </svg>
        {{ 'nav.favorites' | translate }}
      </h1>
      <p class="page-sub">{{ 'favorites.subtitle' | translate }}</p>
    </div>

    <ng-container *ngIf="loading()">
      <div *ngFor="let item of skeletonItems" class="skeleton-card card">
        <div class="sk-author">
          <span class="skeleton-circle" style="width:40px;height:40px"></span>
          <div style="flex:1">
            <span class="skeleton-text" style="width:100px;display:block"></span>
            <span class="skeleton-text" style="width:70px;margin-top:5px;display:block"></span>
          </div>
        </div>
        <span class="skeleton-title" style="width:80%;margin:0 16px 8px;height:22px;display:block"></span>
        <span class="skeleton-image" style="height:180px;border-radius:0;display:block"></span>
        <div style="display:flex;gap:8px;padding:10px 16px">
          <span class="skeleton-btn" style="width:80px"></span>
          <span class="skeleton-btn" style="width:80px"></span>
        </div>
      </div>
    </ng-container>

    <div *ngIf="!loading() && posts().length === 0" class="empty-state card" style="border-radius:var(--radius-card);text-align:center;padding:3rem 1rem">
      <div class="empty-icon">🔖</div>
      <p>{{ 'favorites.empty' | translate }}</p>
      <a routerLink="/" class="btn btn-primary" style="margin-top:1rem">{{ 'favorites.browse' | translate }}</a>
    </div>

    <ng-container *ngIf="!loading()">
      <app-post-card *ngFor="let post of posts()" [post]="post" class="fade-in"></app-post-card>
    </ng-container>

  </div>
</div>
